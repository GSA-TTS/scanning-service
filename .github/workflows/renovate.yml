name: Renovate repos

on:
  schedule:
    - cron: "0 10 * * 1-5" # 10:00 UTC weekdays
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (lookup only, no PRs)"
        type: boolean
        default: false

# Prevent concurrent Renovate runs
concurrency:
  group: renovate
  cancel-in-progress: false

permissions: {}

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }} # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run == true && 'lookup' || 'null' }}
          LOG_LEVEL: info
        with:
          configurationFile: .github/renovate-global.json5
          token: ${{ steps.app-token.outputs.token }}
