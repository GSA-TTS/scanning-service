name: Renovate

on:
  schedule:
    - cron: "0 10 * * 1-5" # 10:00 UTC weekdays
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (lookup only, no PRs)"
        type: boolean
        default: false

# Prevent concurrent Renovate runs
concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.7
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          LOG_LEVEL: info
        with:
          configurationFile: .github/renovate-global.json5
          token: ${{ steps.app-token.outputs.token }}
