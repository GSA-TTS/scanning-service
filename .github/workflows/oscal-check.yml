name: OSCAL Drift Check

on:
  pull_request:
    paths:
      - "docs/compliance/**"
  push:
    branches: [main]
    paths:
      - "docs/compliance/**"

jobs:
  oscal-check:
    name: Validate OSCAL component definition
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install trestle
        run: pip install compliance-trestle

      - name: Initialize trestle workspace
        working-directory: docs/compliance
        run: trestle init

      - name: Validate component-definition.json
        working-directory: docs/compliance
        run: |
          set -euo pipefail

          if [ ! -f component-definitions/org-dependency-management/component-definition.json ]; then
            echo "::error::component-definition.json not found"
            exit 1
          fi

          # Validate JSON schema
          trestle validate -t component-definition \
            -n org-dependency-management

      - name: Check markdown ↔ JSON consistency
        working-directory: docs/compliance
        run: |
          set -euo pipefail

          # Regenerate markdown from JSON in-place (trestle preserves
          # existing prose only when generating into the same directory)
          trestle author component-generate \
            --name org-dependency-management \
            --output control-statements

          # If git shows changes, markdown and JSON are out of sync
          if ! git diff --quiet control-statements/; then
            echo "::error::OSCAL drift detected — markdown and JSON are out of sync."
            git diff control-statements/
            echo ""
            echo "To fix: run 'trestle author component-generate' or 'trestle author component-assemble' as appropriate."
            exit 1
          fi

          echo "No OSCAL drift detected."
