name: OSCAL Drift Check

on:
  pull_request:
    paths:
      - "docs/compliance/**"
  push:
    branches: [main]
    paths:
      - "docs/compliance/**"

jobs:
  oscal-check:
    name: Validate OSCAL component definition
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install trestle
        run: pip install compliance-trestle

      - name: Initialize trestle workspace
        working-directory: docs/compliance
        run: trestle init

      - name: Validate component-definition.json
        working-directory: docs/compliance
        run: |
          set -euo pipefail

          if [ ! -f component-definitions/org-dependency-management/component-definition.json ]; then
            echo "::error::component-definition.json not found"
            exit 1
          fi

          # Validate JSON schema
          trestle validate -t component-definition \
            -n org-dependency-management

      # TODO: Enable markdown ↔ JSON drift check once control-statement
      # markdowns are generated via `trestle author component-generate`
      # rather than hand-written.
