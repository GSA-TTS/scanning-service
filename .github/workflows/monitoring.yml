name: Dependency Management Compliance Metrics

on:
  schedule:
    - cron: "0 14 * * 1" # Monday 14:00 UTC
  workflow_dispatch:

jobs:
  metrics:
    name: Collect org-wide dependency metrics
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Collect metrics
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          TODAY=$(date -u +%Y-%m-%d)
          echo "# Dependency Management Metrics — $TODAY" > metrics.md
          echo "" >> metrics.md

          # Staged rollout: explicit repo list
          REPOS="GSA-TTS/scanning-config GSA-TTS/pic-blm-cxworks GSA-TTS/spiff-arena GSA-TTS/spiffworkflow-connector GSA-TTS/terraform-cloudgov"
          TOTAL_REPOS=5
          echo "Checking ${TOTAL_REPOS} repos..."

          # Count repos with renovate.json / renovate.json5 config
          ONBOARDED=0
          NOT_ONBOARDED=""
          for repo in $REPOS; do
            if gh api "/repos/${repo}/contents/renovate.json" > /dev/null 2>&1 || \
               gh api "/repos/${repo}/contents/renovate.json5" > /dev/null 2>&1 || \
               gh api "/repos/${repo}/contents/.renovaterc" > /dev/null 2>&1 || \
               gh api "/repos/${repo}/contents/.renovaterc.json" > /dev/null 2>&1; then
              ONBOARDED=$((ONBOARDED + 1))
            else
              NOT_ONBOARDED="${NOT_ONBOARDED}\n- ${repo}"
            fi
          done

          ONBOARD_PCT=$(( (ONBOARDED * 100) / TOTAL_REPOS ))

          echo "## Onboarding" >> metrics.md
          echo "" >> metrics.md
          echo "| Metric | Value |" >> metrics.md
          echo "|--------|-------|" >> metrics.md
          echo "| Total non-archived repos | ${TOTAL_REPOS} |" >> metrics.md
          echo "| Repos with Renovate config | ${ONBOARDED} |" >> metrics.md
          echo "| Onboarding rate | ${ONBOARD_PCT}% |" >> metrics.md
          echo "" >> metrics.md

          if [ -n "$NOT_ONBOARDED" ]; then
            echo "<details><summary>Repos without Renovate config</summary>" >> metrics.md
            echo "" >> metrics.md
            echo -e "$NOT_ONBOARDED" >> metrics.md
            echo "" >> metrics.md
            echo "</details>" >> metrics.md
            echo "" >> metrics.md
          fi

          # Open Renovate PRs across the org
          echo "Counting open Renovate PRs..."
          OPEN_PRS=$(gh api --paginate "/search/issues?q=org:${ORG}+is:pr+is:open+author:app/renovate" \
            --jq '.total_count' 2>/dev/null | head -1 || echo "0")

          echo "## Open Renovate PRs" >> metrics.md
          echo "" >> metrics.md
          echo "| Metric | Value |" >> metrics.md
          echo "|--------|-------|" >> metrics.md
          echo "| Open PRs org-wide | ${OPEN_PRS} |" >> metrics.md
          echo "" >> metrics.md

          echo "---" >> metrics.md
          echo "*Generated by [monitoring workflow](https://github.com/${ORG}/scanning-config/actions/workflows/monitoring.yml)*" >> metrics.md

          cat metrics.md

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v7
        with:
          name: dependency-metrics-${{ github.run_id }}
          path: metrics.md
          retention-days: 90

  sha-pinning-audit:
    name: Audit GitHub Actions SHA pinning org-wide
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Install zizmor
        run: |
          curl -sfL https://github.com/woodruffw/zizmor/releases/latest/download/zizmor-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x zizmor
          sudo mv zizmor /usr/local/bin/

      - name: Scan repos for unpinned Actions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          TODAY=$(date -u +%Y-%m-%d)
          echo "# SHA Pinning Audit — $TODAY" > pinning-audit.md
          echo "" >> pinning-audit.md

          # Staged rollout: explicit repo list
          REPOS="GSA-TTS/scanning-config GSA-TTS/pic-blm-cxworks GSA-TTS/spiff-arena GSA-TTS/spiffworkflow-connector GSA-TTS/terraform-cloudgov"

          CLEAN=0
          ISSUES=0
          NO_WORKFLOWS=0
          PROBLEM_REPOS=""

          for repo in $REPOS; do
            TMPDIR=$(mktemp -d)

            # Download workflow files; skip repo if none found
            URLS=$(gh api "/repos/${repo}/contents/.github/workflows" \
              --jq '.[] | select(.name | endswith(".yml") or endswith(".yaml")) | .download_url' 2>/dev/null || true)

            if [ -z "$URLS" ]; then
              NO_WORKFLOWS=$((NO_WORKFLOWS + 1))
              rm -rf "$TMPDIR"
              continue
            fi

            echo "$URLS" | while read -r url; do
              curl -sf "$url" -o "${TMPDIR}/$(basename "$url")" 2>/dev/null || true
            done

            # Check if any files were actually downloaded
            if ! ls "${TMPDIR}"/*.yml "${TMPDIR}"/*.yaml > /dev/null 2>&1; then
              NO_WORKFLOWS=$((NO_WORKFLOWS + 1))
              rm -rf "$TMPDIR"
              continue
            fi

            # Run zizmor
            if zizmor --format plain "${TMPDIR}/" > /dev/null 2>&1; then
              CLEAN=$((CLEAN + 1))
            else
              ISSUES=$((ISSUES + 1))
              SHORT_NAME=$(echo "$repo" | cut -d'/' -f2)
              PROBLEM_REPOS="${PROBLEM_REPOS}\n- [${SHORT_NAME}](https://github.com/${repo})"
            fi

            rm -rf "$TMPDIR"
          done

          echo "| Metric | Value |" >> pinning-audit.md
          echo "|--------|-------|" >> pinning-audit.md
          echo "| Repos fully pinned | ${CLEAN} |" >> pinning-audit.md
          echo "| Repos with unpinned refs | ${ISSUES} |" >> pinning-audit.md
          echo "| Repos without workflows | ${NO_WORKFLOWS} |" >> pinning-audit.md
          echo "" >> pinning-audit.md

          if [ -n "$PROBLEM_REPOS" ]; then
            echo "<details><summary>Repos with unpinned Actions refs</summary>" >> pinning-audit.md
            echo "" >> pinning-audit.md
            echo -e "$PROBLEM_REPOS" >> pinning-audit.md
            echo "" >> pinning-audit.md
            echo "</details>" >> pinning-audit.md
          fi

          cat pinning-audit.md

      - name: Upload pinning audit
        uses: actions/upload-artifact@v7
        with:
          name: sha-pinning-audit-${{ github.run_id }}
          path: pinning-audit.md
          retention-days: 90
