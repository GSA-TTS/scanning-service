name: "GitHub Actions Security Analysis"

on:
  schedule:
    - cron: "0 12 * * 3" # Wednesday 12:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report findings without creating PRs/issues"
        type: boolean
        default: false

permissions: {}

jobs:
  sast-scan:
    name: Scan org repos for Actions security issues
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }} # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          owner: ${{ github.repository_owner }}

      - name: Install zizmor
        run: |
          curl -sfL https://github.com/woodruffw/zizmor/releases/latest/download/zizmor-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x zizmor
          sudo mv zizmor /usr/local/bin/

      - name: Scan repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          ZIZMOR_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NO_COLOR: "1"
        run: |
          set -euo pipefail

          TODAY=$(date -u +%Y-%m-%d)
          LABEL="actions-security"
          PR_PREFIX="fix: zizmor auto-fix Actions security findings"
          ISSUE_PREFIX="zizmor: Actions security findings"

          # Create a zizmor config that skips unpinned-uses (Renovate handles that)
          printf 'rules:\n  unpinned-uses:\n    disable: true\n' > /tmp/zizmor.yml

          # Staged rollout: explicit repo list
          REPOS="GSA-TTS/scanning-service GSA-TTS/pic-blm-cxworks GSA-TTS/spiff-arena GSA-TTS/spiffworkflow-connector GSA-TTS/terraform-cloudgov"

          SCANNED=0
          CLEAN=0
          FINDINGS=0
          FIXED=0
          REPORTED=0

          echo "# zizmor SAST Report — $TODAY" > "$GITHUB_WORKSPACE/sast-report.md"
          echo "" >> "$GITHUB_WORKSPACE/sast-report.md"

          for repo in $REPOS; do
            SHORT_NAME=$(echo "$repo" | cut -d'/' -f2)

            # Only scan repos that have opted in (merged the onboarding PR)
            if ! gh api "/repos/${repo}/contents/renovate.json" > /dev/null 2>&1 && \
               ! gh api "/repos/${repo}/contents/renovate.json5" > /dev/null 2>&1 && \
               ! gh api "/repos/${repo}/contents/.renovaterc" > /dev/null 2>&1 && \
               ! gh api "/repos/${repo}/contents/.renovaterc.json" > /dev/null 2>&1; then
              continue
            fi

            # Check if repo has workflow files
            WORKFLOW_COUNT=$(gh api "/repos/${repo}/contents/.github/workflows" \
              --jq 'length' 2>/dev/null || echo "0")

            if [ "$WORKFLOW_COUNT" = "0" ]; then
              continue
            fi

            SCANNED=$((SCANNED + 1))
            WORKDIR=$(mktemp -d)

            # Clone the repo (shallow)
            gh repo clone "$repo" "$WORKDIR" -- --depth 1 --quiet 2>/dev/null || {
              echo "::warning::Failed to clone ${repo}, skipping"
              rm -rf "$WORKDIR"
              continue
            }

            # Run zizmor in report mode first (no fixes)
            REPORT_OUTPUT=$(zizmor --config /tmp/zizmor.yml --format plain \
              "$WORKDIR/.github/workflows/" 2>&1 || true)

            if [ -z "$REPORT_OUTPUT" ] || echo "$REPORT_OUTPUT" | grep -q "No findings"; then
              CLEAN=$((CLEAN + 1))
              rm -rf "$WORKDIR"
              continue
            fi

            FINDINGS=$((FINDINGS + 1))

            if [ "$DRY_RUN" = "true" ]; then
              echo "### ${SHORT_NAME}" >> "$GITHUB_WORKSPACE/sast-report.md"
              echo '```' >> "$GITHUB_WORKSPACE/sast-report.md"
              echo "$REPORT_OUTPUT" >> "$GITHUB_WORKSPACE/sast-report.md"
              echo '```' >> "$GITHUB_WORKSPACE/sast-report.md"
              echo "" >> "$GITHUB_WORKSPACE/sast-report.md"
              rm -rf "$WORKDIR"
              continue
            fi

            # Try auto-fixing (safe + unsafe fixes; PRs go through human review)
            FIX_OUTPUT=$(zizmor --config /tmp/zizmor.yml --fix=all \
              "$WORKDIR/.github/workflows/" 2>&1 || true)

            cd "$WORKDIR"

            if git diff --quiet; then
              # No auto-fixable changes — open an issue with findings
              EXISTING_ISSUE=$(gh issue list --repo "$repo" --state open \
                --search "in:title \"${ISSUE_PREFIX}\"" --json number,title \
                --jq ".[] | select(.title == \"${ISSUE_PREFIX}\") | .number" \
                | head -1 2>/dev/null || true)

              ISSUE_BODY="**zizmor found security findings in this repo's GitHub Actions workflows.**

          These findings require manual review — they cannot be auto-fixed.

          <details>
          <summary>Findings (${TODAY})</summary>

          \`\`\`
          ${REPORT_OUTPUT}
          \`\`\`

          </details>

          ### What to do

          Review each finding and determine if it's a real issue or an accepted risk:

          - **Template injection**: Avoid expanding untrusted inputs in \`run:\` blocks. Use environment variables instead.
          - **Excessive permissions**: Reduce \`permissions:\` to the minimum needed.
          - **Credential exposure**: Avoid persisting credentials or writing secrets to logs/artifacts.
          - **ref-confusion**: Use full-length refs to avoid ambiguity between branches and tags.

          See [zizmor's audit documentation](https://docs.zizmor.sh/audits/) for details on each finding type.

          Add \`# zizmor: ignore[rule-name]\` comments to suppress accepted risks.

          ---
          *Generated by the [zizmor SAST workflow](https://github.com/${ORG}/scanning-service/actions/workflows/zizmor-sast.yml)*"

              if [ -n "$EXISTING_ISSUE" ]; then
                echo "$ISSUE_BODY" | gh issue comment "$EXISTING_ISSUE" \
                  --repo "$repo" --body-file -
                echo "Updated issue #${EXISTING_ISSUE} in ${repo}"
              else
                gh issue create --repo "$repo" \
                  --title "$ISSUE_PREFIX" \
                  --body "$ISSUE_BODY" \
                  --label "$LABEL" 2>/dev/null || {
                    # Label might not exist; create without it
                    gh issue create --repo "$repo" \
                      --title "$ISSUE_PREFIX" \
                      --body "$ISSUE_BODY"
                  }
                echo "Created issue in ${repo}"
              fi
              REPORTED=$((REPORTED + 1))
            else
              # Auto-fixable changes found — open a PR
              BRANCH="zizmor/sast-fixes-${TODAY}"

              # Check for existing open PR
              EXISTING_PR=$(gh pr list --repo "$repo" --state open \
                --search "in:title \"${PR_PREFIX}\"" --json number \
                --jq '.[0].number' 2>/dev/null || true)

              if [ -n "$EXISTING_PR" ]; then
                echo "Existing PR #${EXISTING_PR} in ${repo}, skipping"
                FIXED=$((FIXED + 1))
                cd /
                rm -rf "$WORKDIR"
                continue
              fi

              # Check for remaining unfixable findings
              REMAINING=$(zizmor --config /tmp/zizmor.yml --format plain \
                "$WORKDIR/.github/workflows/" 2>&1 || true)

              DIFF_STAT=$(git diff --stat)
              REMAINING_SECTION=""
              if [ -n "$REMAINING" ] && ! echo "$REMAINING" | grep -q "No findings"; then
                REMAINING_SECTION="### Remaining findings (need manual review)

          <details>
          <summary>Details</summary>

          \`\`\`
          ${REMAINING}
          \`\`\`

          </details>"
              fi

              PR_BODY="zizmor found security issues in this repo's GitHub Actions workflows and applied safe auto-fixes.

          ### What was fixed

          \`\`\`
          ${DIFF_STAT}
          \`\`\`

          ${REMAINING_SECTION}

          See [zizmor's audit documentation](https://docs.zizmor.sh/audits/) for details on each finding type.

          ---
          *Generated by the [zizmor SAST workflow](https://github.com/${ORG}/scanning-service/actions/workflows/zizmor-sast.yml)*"

              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git checkout -b "$BRANCH"
              git add -A
              git commit -m "fix: apply zizmor safe auto-fixes for Actions security"
              git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git"
              git push origin "$BRANCH"

              gh pr create --repo "$repo" \
                --title "$PR_PREFIX" \
                --body "$PR_BODY" \
                --head "$BRANCH" \
                --base main

              echo "Created PR in ${repo}"
              FIXED=$((FIXED + 1))
            fi

            cd /
            rm -rf "$WORKDIR"
          done

          echo "| Metric | Value |" >> "$GITHUB_WORKSPACE/sast-report.md"
          echo "|--------|-------|" >> "$GITHUB_WORKSPACE/sast-report.md"
          echo "| Repos scanned | ${SCANNED} |" >> "$GITHUB_WORKSPACE/sast-report.md"
          echo "| Clean repos | ${CLEAN} |" >> "$GITHUB_WORKSPACE/sast-report.md"
          echo "| Repos with findings | ${FINDINGS} |" >> "$GITHUB_WORKSPACE/sast-report.md"
          echo "| PRs opened (auto-fixed) | ${FIXED} |" >> "$GITHUB_WORKSPACE/sast-report.md"
          echo "| Issues opened/updated | ${REPORTED} |" >> "$GITHUB_WORKSPACE/sast-report.md"

          cat "$GITHUB_WORKSPACE/sast-report.md"

      - name: Upload SAST report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: zizmor-sast-report-${{ github.run_id }}
          path: ${{ github.workspace }}/sast-report.md
          retention-days: 90
