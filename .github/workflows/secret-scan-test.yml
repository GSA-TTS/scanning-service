name: Secret Scan Self-Test

on:
  pull_request:
    paths:
      - ".gitleaks.toml"
      - ".github/actions/secret-scan/**"
      - ".github/workflows/secret-scan.yml"
      - ".github/workflows/gitleaks-audit.yml"
      - ".github/workflows/secret-scan-test.yml"
      - "bin/test-gitleaks-config"
  push:
    branches: [main]
    paths:
      - ".gitleaks.toml"
      - ".github/actions/secret-scan/**"
      - ".github/workflows/secret-scan.yml"
      - ".github/workflows/gitleaks-audit.yml"
      - ".github/workflows/secret-scan-test.yml"
      - "bin/test-gitleaks-config"

permissions: {}

jobs:
  validate-config:
    name: Validate gitleaks config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Validate config syntax
        run: |
          set -euo pipefail
          # gitleaks will exit non-zero if the config is invalid
          gitleaks detect --source=. --no-git --config=.gitleaks.toml --exit-code=0 > /dev/null 2>&1
          echo "Config is valid."

  test-composite-action:
    name: Test composite action (clean repo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run secret scan action (should pass)
        uses: ./.github/actions/secret-scan
        with:
          fail-on-error: "true"
          scan-mode: "full"
          config-path: ".gitleaks.toml"

  test-deliberate-finding:
    name: Test detection accuracy and false-positive regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run config tests
        run: bin/test-gitleaks-config .gitleaks.toml
