name: Secret Scan

on:
  workflow_call:
    inputs:
      fail-on-error:
        description: "Whether to fail the workflow on findings (set false for advisory mode)"
        type: boolean
        default: false
      scan-mode:
        description: "Scan mode: 'staged' for pre-merge PR checks, 'full' for full repo history"
        type: string
        default: "staged"

jobs:
  secret-scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Checkout scanning-service for composite action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.repository_owner }}/scanning-service
          persist-credentials: false
          path: .scanning-service

      - name: Run secret scan
        uses: ./.scanning-service/.github/actions/secret-scan
        with:
          fail-on-error: ${{ inputs.fail-on-error && 'true' || 'false' }}
          scan-mode: ${{ inputs.scan-mode }}
