name: "Secret Scanning Audit"

on:
  schedule:
    - cron: "0 12 * * 1" # Monday 12:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report findings without creating issues"
        type: boolean
        default: false

permissions: {}

jobs:
  secret-audit:
    name: Scan org repos for leaked secrets
    runs-on: ubuntu-latest
    permissions:
      actions: write  # upload-artifact
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }} # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          owner: ${{ github.repository_owner }}

      - name: Checkout scanning-service for config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/actions/repo-list
            .github/repos.txt
            .gitleaks.toml
            bin/merge-gitleaks-config

      - name: Load repository list
        id: repo-list
        uses: ./.github/actions/repo-list

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          TODAY=$(date -u +%Y-%m-%d)
          LABEL="secret-scan"
          ISSUE_PREFIX="gitleaks: secret scanning findings"
          CONFIG="${GITHUB_WORKSPACE}/.gitleaks.toml"

          # Repo list is single-sourced from .github/repos.txt
          REPOS="${{ steps.repo-list.outputs.repos }}"

          SCANNED=0
          CLEAN=0
          FINDINGS=0
          REPORTED=0
          CLEAN_REPOS=""

          echo "# gitleaks Secret Scan Report — $TODAY" > "$GITHUB_WORKSPACE/secret-scan-report.md"
          echo "" >> "$GITHUB_WORKSPACE/secret-scan-report.md"

          for repo in $REPOS; do
            SHORT_NAME=$(echo "$repo" | cut -d'/' -f2)

            # Only scan repos that have opted in (merged the Renovate onboarding PR)
            if ! gh api "/repos/${repo}/contents/renovate.json" > /dev/null 2>&1 && \
               ! gh api "/repos/${repo}/contents/renovate.json5" > /dev/null 2>&1 && \
               ! gh api "/repos/${repo}/contents/.renovaterc" > /dev/null 2>&1 && \
               ! gh api "/repos/${repo}/contents/.renovaterc.json" > /dev/null 2>&1; then
              continue
            fi

            SCANNED=$((SCANNED + 1))
            WORKDIR=$(mktemp -d)

            # Clean stale report from previous iteration
            rm -f /tmp/gitleaks-report.json

            # Clone the repo
            gh repo clone "$repo" "$WORKDIR" -- --depth 1 --quiet 2>/dev/null || {
              echo "::warning::Failed to clone ${repo}, skipping"
              rm -rf "$WORKDIR"
              continue
            }

            # Merge repo-local allowlist into org config if present
            SCAN_CONFIG="$CONFIG"
            if [ -f "$WORKDIR/.gitleaks.toml" ]; then
              python3 "${GITHUB_WORKSPACE}/scanning-service/bin/merge-gitleaks-config" \
                "$CONFIG" "$WORKDIR/.gitleaks.toml" /tmp/gitleaks-merged.toml
              SCAN_CONFIG="/tmp/gitleaks-merged.toml"
            fi

            # Run gitleaks (scan working tree, not history — history scan is expensive for weekly audits)
            REPORT_OUTPUT=$(gitleaks detect --source="$WORKDIR" --no-git \
              --config="$SCAN_CONFIG" --report-format=json --report-path=/tmp/gitleaks-report.json \
              --verbose 2>&1 || true)

            if [ ! -f /tmp/gitleaks-report.json ] || [ "$(jq 'length' /tmp/gitleaks-report.json 2>/dev/null)" = "0" ]; then
              CLEAN=$((CLEAN + 1))
              CLEAN_REPOS="${CLEAN_REPOS} ${repo}"
              rm -rf "$WORKDIR" /tmp/gitleaks-report.json
              continue
            fi

            FINDING_COUNT=$(jq 'length' /tmp/gitleaks-report.json)
            FINDINGS=$((FINDINGS + 1))

            # Format findings with GitHub source links (rule IDs and file paths only — never include actual secret values)
            FINDING_SUMMARY=$(jq -r --arg workdir "$WORKDIR" --arg repo "$repo" \
              '.[] | .File as $f | ($f | ltrimstr($workdir) | ltrimstr("/")) as $rel |
              "- \(.RuleID): [\($rel)#L\(.StartLine)](https://github.com/\($repo)/blob/main/\($rel)#L\(.StartLine))"' \
              /tmp/gitleaks-report.json)

            if [ "$DRY_RUN" = "true" ]; then
              echo "### ${SHORT_NAME} (${FINDING_COUNT} findings)" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
              echo "" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
              echo "$FINDING_SUMMARY" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
              echo "" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
              rm -rf "$WORKDIR" /tmp/gitleaks-report.json
              continue
            fi

            # Create or update issue
            EXISTING_ISSUE=$(gh issue list --repo "$repo" --state open \
              --search "in:title \"${ISSUE_PREFIX}\"" --json number,title \
              --jq ".[] | select(.title == \"${ISSUE_PREFIX}\") | .number" \
              | head -1 2>/dev/null || true)

            ISSUE_BODY="**gitleaks found ${FINDING_COUNT} potential secret(s) in this repo.**

          <details>
          <summary>Findings (${TODAY})</summary>

          ${FINDING_SUMMARY}

          </details>

          ### What to do

          1. **Verify** each finding — some may be false positives (test fixtures, example values)
          2. **Rotate** any real secrets immediately — assume they are compromised
          3. **Remove** the secret from source code (note: it remains in git history unless you rewrite it)
          4. **Allowlist** confirmed false positives in your repo's \`.gitleaks.toml\` or the [org config](https://github.com/${ORG}/scanning-service/blob/main/.gitleaks.toml)

          ---
          *Generated by the [secret scanning audit workflow](https://github.com/${ORG}/scanning-service/actions/workflows/gitleaks-audit.yml)*"

            if [ -n "$EXISTING_ISSUE" ]; then
              echo "$ISSUE_BODY" | gh issue comment "$EXISTING_ISSUE" \
                --repo "$repo" --body-file -
              echo "Updated issue #${EXISTING_ISSUE} in ${repo}"
            else
              gh issue create --repo "$repo" \
                --title "$ISSUE_PREFIX" \
                --body "$ISSUE_BODY" \
                --label "$LABEL" 2>/dev/null || {
                  # Label might not exist; create without it
                  gh issue create --repo "$repo" \
                    --title "$ISSUE_PREFIX" \
                    --body "$ISSUE_BODY"
                }
              echo "Created issue in ${repo}"
            fi
            REPORTED=$((REPORTED + 1))

            rm -rf "$WORKDIR" /tmp/gitleaks-report.json
          done

          # Close issues in repos that are now clean
          for repo in $REPOS; do
            EXISTING=$(gh api "/repos/${repo}/issues?state=open&per_page=100" \
              --jq "[.[] | select(.title == \"${ISSUE_PREFIX}\")] | if length > 0 then \"\(.[0].number)\" else \"\" end" 2>/dev/null || echo "")

            if [ -n "$EXISTING" ]; then
              # Close only if the repo was scanned and came back clean
              if echo "$CLEAN_REPOS" | grep -qw "$repo"; then
                gh issue close "$EXISTING" -R "$repo" \
                  -c "All clear — no secrets detected as of ${TODAY}." --reason completed > /dev/null 2>&1 || true
                SHORT_NAME=$(echo "$repo" | cut -d'/' -f2)
                echo "Closed issue #${EXISTING} in ${SHORT_NAME} (clean)"
              fi
            fi
          done

          echo "" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
          echo "| Metric | Value |" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
          echo "|--------|-------|" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
          echo "| Repos scanned | ${SCANNED} |" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
          echo "| Clean repos | ${CLEAN} |" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
          echo "| Repos with findings | ${FINDINGS} |" >> "$GITHUB_WORKSPACE/secret-scan-report.md"
          echo "| Issues opened/updated | ${REPORTED} |" >> "$GITHUB_WORKSPACE/secret-scan-report.md"

          cat "$GITHUB_WORKSPACE/secret-scan-report.md"

      - name: Upload audit report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: secret-scan-report-${{ github.run_id }}
          path: ${{ github.workspace }}/secret-scan-report.md
          retention-days: 90
